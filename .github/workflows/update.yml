name: Generate snake animation

on:
  schedule: # execute @daily midnight UTC
    - cron: "0 0 * * */3"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake.svg?palette=github-dark
          # Step 3: Generate the OSS badge inside 'dist'
          
      - name: generate OSS stats badge
        uses: mabd-dev/gh-oss-stats-action@v0.2.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          badge-path: 'dist/oss-badge.svg'
          badge-style: 'detailed'      
          badge-theme: 'nord'          
          # badge-variant: 'text-based'  
          # min-stars: '100'             
          # exclude-orgs: 'calculatorbit,thetechbasket'


      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
