name: Generate snake animation

on:
  schedule: # execute @daily midnight UTC
    - cron: "0 0 * * */3"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ensure dist exists
        run: mkdir -p dist
        
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake.svg?palette=github-dark
          # Step 3: Generate the OSS badge inside 'dist'
          
      - name: generate OSS stats badge # https://github.com/mabd-dev/gh-oss-stats-action#inputs
        uses: mabd-dev/gh-oss-stats-action@v0.2.1
        with:
          commit-badge: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          badge-output-path: 'dist/oss-badge.svg'
          badge-style: 'detailed'      
          badge-theme: 'nord'
          badge-limit: '10'
          # badge-variant: 'text-based'  
          # min-stars: '100'             
          # exclude-orgs: 'calculatorbit,thetechbasket'
      - name: Fetch file
        run: |
          curl -L "https://profile-counter.glitch.me/amitind/count.svg" -o dist/count.svg
          curl -L "https://streak-stats.demolab.com?user=amitind&locale=en&mode=daily&theme=tokyonight&hide_border=true&border_radius=20" -o dist/streak-stats.svg
          
      - name: Verify files
        run: ls -la dist
        
      - name: push to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
